<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      color: #f8fafc;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
    }

    /* Background grid pattern */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }

    .summary-container {
      max-width: 900px;
      margin: auto;
      background: rgba(30, 41, 59, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 1;
    }

    .qa-pair {
      background: rgba(15, 23, 42, 0.4);
      margin-bottom: 24px;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: border-color 0.2s ease;
    }

    .qa-pair:hover {
      border-color: rgba(59, 130, 246, 0.2);
    }

    .qa-pair h3 {
      font-family: 'Playfair Display', Georgia, serif;
      color: #cbd5e1;
      margin-bottom: 14px;
      font-size: 1.15rem;
      font-weight: 600;
    }

    .qa-pair p {
      color: #94a3b8;
      font-size: 0.98rem;
      margin: 8px 0;
      line-height: 1.6;
    }

    .qa-pair p strong {
      color: #f8fafc;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.9rem;
      color: #64748b;
      position: relative;
      z-index: 1;
    }

    .footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .footer a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    /* Responsive Styles */
    @media (max-width: 600px) {
      body {
        padding: 30px 15px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 25px;
      }

      .qa-pair {
        padding: 16px;
      }

      .qa-pair h3 {
        font-size: 1.05rem;
      }

      .qa-pair p {
        font-size: 0.92rem;
      }

      .summary-container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <h1>📋 Interview Summary</h1>
  <div class="summary-container">
    {% for item in answers %}
    <div class="qa-pair">
      <h3>Q: {{ item.question }}</h3>
      <p><strong>👤 You:</strong> {{ item.answer }}</p>
      <p><strong>🤖 AI Suggestion:</strong> {{ item.ideal }}</p>
    </div>
    {% endfor %}
  </div>

  <div class="footer">
    <p><a href="/dashboard">Back to Dashboard</a></p>
  </div>

</body>
</html>
