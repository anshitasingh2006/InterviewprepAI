<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Welcome Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      color: #f8fafc;
    }

    /* Subtle background grid pattern for high quality feeling */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      top: 0;
      left: 0;
    }

    .login-container {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 45px 40px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
    }

    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-header h2 {
      font-family: 'Playfair Display', Georgia, Cambria, "Times New Roman", Times, serif;
      color: #f8fafc;
      font-size: 2.2em;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .login-header p {
      color: #94a3b8;
      font-size: 1em;
      font-weight: 400;
    }

    .error-messages {
      margin-bottom: 25px;
    }

    .error-messages ul {
      list-style: none;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      font-weight: 500;
      font-size: 0.95em;
    }

    .error-messages li {
      margin: 5px 0;
      position: relative;
      padding-left: 20px;
    }

    .error-messages li::before {
      content: '⚠';
      position: absolute;
      left: 0;
      top: 0;
      color: #ef4444;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
      transition: transform 0.2s ease;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 500;
      font-size: 0.95em;
      letter-spacing: 0.01em;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 1em;
      color: #f8fafc;
      transition: all 0.25s ease;
      background: rgba(15, 23, 42, 0.5);
      outline: none;
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .form-group input:hover {
      border-color: #475569;
    }

    .login-button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .login-button:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }

    .register-link p {
      color: #94a3b8;
      font-size: 0.95em;
    }

    .register-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .register-link a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    /* Responsive design */
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 24px;
        margin: 0 10px;
      }

      .login-header h2 {
        font-size: 1.8em;
      }

      .login-header p {
        font-size: 0.9em;
      }

      .form-group label {
        font-size: 0.9em;
      }

      .form-group input {
        font-size: 0.95em;
        padding: 12px 14px;
      }

      .login-button {
        font-size: 0.95em;
        padding: 12px;
      }
    }

    @keyframes spin {
      0% { transform: translateY(-50%) rotate(0deg); }
      100% { transform: translateY(-50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your account</p>
    </div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error-messages">
          <ul>
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}
    {% endwith %}
    
    <form method="POST" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
      </div>
      
      <button type="submit" class="login-button" id="loginBtn">
        Sign In
      </button>
    </form>
    
    <div class="register-link">
      <p>New user? <a href="{{ url_for('register') }}">Create an account</a></p>
    </div>
  </div>

  <script>
    // Add loading state to button on form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.textContent = 'Signing In...';
    });

    // Add subtle animations to form elements
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });
  </script>
</body>
</html>
