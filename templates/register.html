<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Join Us Today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      color: #f8fafc;
    }

    /* Subtle background grid pattern for high quality feeling */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      top: 0;
      left: 0;
    }

    .register-container {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 45px 40px;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .register-container:hover {
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
    }

    .register-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .register-header h2 {
      font-family: 'Playfair Display', Georgia, Cambria, "Times New Roman", Times, serif;
      color: #f8fafc;
      font-size: 2.2em;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .register-header p {
      color: #94a3b8;
      font-size: 1em;
      font-weight: 400;
    }

    .error-messages {
      margin-bottom: 25px;
    }

    .error-messages ul {
      list-style: none;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      font-weight: 500;
      font-size: 0.95em;
    }

    .error-messages li {
      margin: 5px 0;
      position: relative;
      padding-left: 20px;
    }

    .error-messages li::before {
      content: '⚠';
      position: absolute;
      left: 0;
      top: 0;
      color: #ef4444;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
      transition: transform 0.2s ease;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 500;
      font-size: 0.95em;
      letter-spacing: 0.01em;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 1em;
      color: #f8fafc;
      transition: all 0.25s ease;
      background: rgba(15, 23, 42, 0.5);
      outline: none;
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .form-group input:hover {
      border-color: #475569;
    }

    .form-group input.valid {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    .form-group input.invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .password-strength {
      margin-top: 8px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.88em;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(-10px);
    }

    .password-strength.show {
      opacity: 1;
      transform: translateY(0);
    }

    .password-strength.weak {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .password-strength.medium {
      background: rgba(245, 158, 11, 0.1);
      color: #fde047;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .password-strength.strong {
      background: rgba(16, 185, 129, 0.1);
      color: #a7f3d0;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .password-match {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.88em;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(-10px);
    }

    .password-match.show {
      opacity: 1;
      transform: translateY(0);
    }

    .password-match.match {
      background: rgba(16, 185, 129, 0.1);
      color: #a7f3d0;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .password-match.no-match {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .register-button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .register-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      background: #1e293b !important;
      border-color: #334155 !important;
      color: #64748b !important;
    }

    .register-button:hover:not(:disabled) {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .register-button:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }

    .login-link p {
      color: #94a3b8;
      font-size: 0.95em;
    }

    .login-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .login-link a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    /* Responsive design */
    @media (max-width: 480px) {
      .register-container {
        padding: 30px 24px;
        margin: 10px;
      }

      .register-header h2 {
        font-size: 1.8em;
      }

      .register-header p {
        font-size: 0.9em;
      }

      .form-group label {
        font-size: 0.9em;
      }

      .form-group input {
        font-size: 0.95em;
        padding: 12px 14px;
      }

      .register-button {
        font-size: 0.95em;
        padding: 12px;
      }
    }

    /* Loading animation for button */
    .register-button.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .register-button.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: translateY(-50%) rotate(0deg); }
      100% { transform: translateY(-50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <h2>Join Us Today</h2>
      <p>Create your new account</p>
    </div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error-messages">
          <ul>
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}
    {% endwith %}
    
    <form method="POST" id="registerForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Create a strong password">
        <div class="password-strength" id="passwordStrength"></div>
      </div>
      
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-type your password">
        <div class="password-match" id="passwordMatch"></div>
      </div>
      
      <button type="submit" class="register-button" id="registerBtn" disabled>
        Create Account
      </button>
    </form>
    
    <div class="login-link">
      <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const passwordStrength = document.getElementById('passwordStrength');
    const passwordMatch = document.getElementById('passwordMatch');
    const registerBtn = document.getElementById('registerBtn');
    const registerForm = document.getElementById('registerForm');

    // Password strength checker
    function checkPasswordStrength(password) {
      let strength = 0;
      let feedback = [];

      if (password.length >= 8) strength++;
      else feedback.push('At least 8 characters');

      if (/[a-z]/.test(password)) strength++;
      else feedback.push('lowercase letter');

      if (/[A-Z]/.test(password)) strength++;
      else feedback.push('uppercase letter');

      if (/[0-9]/.test(password)) strength++;
      else feedback.push('number');

      if (/[^A-Za-z0-9]/.test(password)) strength++;
      else feedback.push('special character');

      return { strength, feedback };
    }

    // Update password strength indicator
    passwordInput.addEventListener('input', function() {
      const password = this.value;
      const result = checkPasswordStrength(password);
      
      if (password.length === 0) {
        passwordStrength.classList.remove('show');
        this.classList.remove('valid', 'invalid');
        return;
      }

      passwordStrength.classList.add('show');
      passwordStrength.classList.remove('weak', 'medium', 'strong');

      if (result.strength <= 2) {
        passwordStrength.classList.add('weak');
        passwordStrength.textContent = '🔴 Weak - Add: ' + result.feedback.join(', ');
        this.classList.add('invalid');
        this.classList.remove('valid');
      } else if (result.strength <= 3) {
        passwordStrength.classList.add('medium');
        passwordStrength.textContent = '🟡 Medium - Add: ' + result.feedback.join(', ');
        this.classList.remove('invalid', 'valid');
      } else {
        passwordStrength.classList.add('strong');
        passwordStrength.textContent = '🟢 Strong password!';
        this.classList.add('valid');
        this.classList.remove('invalid');
      }

      checkPasswordMatch();
      updateSubmitButton();
    });

    // Check password match
    function checkPasswordMatch() {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (confirmPassword.length === 0) {
        passwordMatch.classList.remove('show');
        confirmPasswordInput.classList.remove('valid', 'invalid');
        return;
      }

      passwordMatch.classList.add('show');
      passwordMatch.classList.remove('match', 'no-match');

      if (password === confirmPassword) {
        passwordMatch.classList.add('match');
        passwordMatch.textContent = '✅ Passwords match!';
        confirmPasswordInput.classList.add('valid');
        confirmPasswordInput.classList.remove('invalid');
      } else {
        passwordMatch.classList.add('no-match');
        passwordMatch.textContent = '❌ Passwords do not match';
        confirmPasswordInput.classList.add('invalid');
        confirmPasswordInput.classList.remove('valid');
      }
    }

    confirmPasswordInput.addEventListener('input', checkPasswordMatch);

    // Update submit button state
    function updateSubmitButton() {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const email = document.getElementById('email').value;
      
      const passwordStrong = checkPasswordStrength(password).strength >= 3;
      const passwordsMatch = password === confirmPassword && password.length > 0;
      const emailValid = email.length > 0;

      if (passwordStrong && passwordsMatch && emailValid) {
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
      } else {
        registerBtn.disabled = true;
        registerBtn.textContent = 'Complete all fields';
      }
    }

    // Update button on email input
    document.getElementById('email').addEventListener('input', updateSubmitButton);

    // Add loading state to button on form submission
    registerForm.addEventListener('submit', function(e) {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      
      if (password !== confirmPassword) {
        e.preventDefault();
        alert('Passwords do not match!');
        return;
      }
      
      registerBtn.classList.add('loading');
      registerBtn.textContent = 'Creating Account...';
    });

    // Add subtle animations to form elements
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
        updateSubmitButton();
      });
    });
  </script>
</body>
</html>
